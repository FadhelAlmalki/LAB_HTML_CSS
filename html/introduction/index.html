<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Hobbies Mini Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/introduction/style.css">
</head>
<body>
    <div class="page">
        <header>
            <h1>My Favorite Hobbies</h1>
            <p>Mini project built with HTML and CSS.</p>
        </header>

        <main>
            <section class="card">
            <h2>Hobbies List</h2>
            <ul>
                <li>Learning Japanese language and culture.</li>
                <li>Playing video games in my free time.</li>
            </ul>
            </section>

            <section class="card">
                <h2>Hobby Images</h2>

                <figure>
                    <img src="images/japanese language.png" alt="Japanese language text" width="600">
                    <figcaption>Japanese language hobby</figcaption>
                </figure>

                <figure>
                    <img src="images/video games.png" alt="Colorful pixel-art game scene" width="600">
                    <figcaption>Video games hobby</figcaption>
                </figure>
            </section>
        </main>
    </div>
</body>
</html>
